CONFIG_LV_USE_NEMA_GFX=y
CONFIG_LV_USE_NEMA_VG=y
CONFIG_LV_USE_VECTOR_GRAPHIC=y
CONFIG_LV_USE_MATRIX=y
CONFIG_LV_USE_FLOAT=y
CONFIG_LV_USE_DRAW_DMA2D=n

CONFIG_FPU=y
CONFIG_FP_HARDABI=y
CONFIG_CPU_LOAD=y

CONFIG_MAIN_STACK_SIZE=8192

# LV_DRAW_LAYER_SIMPLE_BUF_SIZE >= 38kB (>= 1/20 screen size) otherwise it might crash/freeze the UI unexpectedly 
# (using Nema or the software renderer).
CONFIG_LV_Z_MEM_POOL_SIZE=899072
CONFIG_LV_DRAW_LAYER_SIMPLE_BUF_SIZE=899072
